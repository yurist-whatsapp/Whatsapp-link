<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>WhatsApp</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f2f4f7;
      color: #222;
      text-align: center;
      padding: 28px 16px;
    }

    .container {
      max-width: 560px;
      margin: 0 auto;
    }

    .title {
      font-size: 42px;
      font-weight: 800;
      color: #25D366;
      margin: 25px 0 16px;
      line-height: 1.15;
    }

    .subtitle {
      font-size: 26px;
      font-weight: 800;
      line-height: 1.25;
      margin-bottom: 22px;
    }

    .language-buttons {
      display: flex;
      gap: 12px;
      justify-content: center;
      margin-bottom: 28px;
    }

    .lang-button {
      flex: 1;
      max-width: 220px;
      padding: 18px 10px;
      border-radius: 18px;
      border: 3px solid #25D366;
      background: white;
      color: #25D366;
      font-size: 22px;
      font-weight: 800;
      cursor: pointer;
    }

    .lang-button.active {
      background: #25D366;
      color: white;
    }

    .topic-title {
      font-size: 30px;
      font-weight: 800;
      margin: 22px 0 20px;
      line-height: 1.25;
    }

    .topic-button {
      display: block;
      width: 100%;
      max-width: 500px;
      margin: 14px auto;
      background: #25D366;
      color: white;
      font-size: 26px;
      font-weight: 800;
      text-decoration: none;
      padding: 24px 16px;
      border-radius: 22px;
      box-shadow: 0 10px 24px rgba(0,0,0,0.15);
      border: none;
      cursor: pointer;
    }

    .topic-button.dark {
      background: #128C7E;
    }

    .phone {
      font-size: 32px;
      font-weight: 800;
      margin: 32px 0 10px;
    }

    .small {
      font-size: 17px;
      color: #777;
      margin-top: 18px;
      line-height: 1.5;
    }
  </style>
</head>

<body>
  <div class="container">

    <div class="title">WhatsApp</div>

    <div class="subtitle" id="subtitle">
      Тілді таңдаңыз
    </div>

    <div class="language-buttons">
      <button class="lang-button active" id="kzBtn" onclick="setLanguage('kz')">
        Қазақша
      </button>

      <button class="lang-button" id="ruBtn" onclick="setLanguage('ru')">
        Русский
      </button>
    </div>

    <div class="topic-title" id="topicTitle">
      Қандай мәселе бойынша жазасыз?
    </div>

    <button class="topic-button" onclick="openWhatsApp('arrest')" id="btnArrest">
      Арест бойынша
    </button>

    <button class="topic-button dark" onclick="openWhatsApp('accountArrest')" id="btnAccountArrest">
      Шот аресті бойынша
    </button>

    <button class="topic-button" onclick="openWhatsApp('autocredit')" id="btnAutocredit">
      Автокредит бойынша
    </button>

    <button class="topic-button dark" onclick="openWhatsApp('schedule')" id="btnSchedule">
      График бойынша
    </button>

    <button class="topic-button" onclick="openWhatsApp('fiveYearSchedule')" id="btnFiveYearSchedule">
      5 жылға график бойынша
    </button>

    <button class="topic-button dark" onclick="openWhatsApp('bankruptcy')" id="btnBankruptcy">
      Банкроттық бойынша
    </button>

    <button class="topic-button" onclick="openWhatsApp('courtBankruptcy')" id="btnCourtBankruptcy">
      Соттық банкроттық бойынша
    </button>

    <div class="phone">+7 778 113 59 62</div>

    <div class="small" id="smallText">
      Тақырыпты таңдаңыз, WhatsApp ашылады
    </div>

  </div>

  <script>
    const phone = "77781135962";
    let currentLanguage = "kz";

    const data = {
      kz: {
        subtitle: "Тілді таңдаңыз",
        topicTitle: "Қандай мәселе бойынша жазасыз?",
        smallText: "Тақырыпты таңдаңыз, WhatsApp ашылады",
        buttons: {
          arrest: "Арест бойынша",
          accountArrest: "Шот аресті бойынша",
          autocredit: "Автокредит бойынша",
          schedule: "График бойынша",
          fiveYearSchedule: "5 жылға график бойынша",
          bankruptcy: "Банкроттық бойынша",
          courtBankruptcy: "Соттық банкроттық бойынша"
        },
        messages: {
          arrest: "Сәлеметсіз бе, мен арест бойынша ақпарат алғым келеді",
          accountArrest: "Сәлеметсіз бе, мен шот аресті бойынша ақпарат алғым келеді",
          autocredit: "Сәлеметсіз бе, мен автокредит бойынша ақпарат алғым келеді",
          schedule: "Сәлеметсіз бе, мен график бойынша ақпарат алғым келеді",
          fiveYearSchedule: "Сәлеметсіз бе, мен 5 жылға график бойынша ақпарат алғым келеді",
          bankruptcy: "Сәлеметсіз бе, мен банкроттық бойынша ақпарат алғым келеді",
          courtBankruptcy: "Сәлеметсіз бе, мен соттық банкроттық бойынша ақпарат алғым келеді"
        }
      },

      ru: {
        subtitle: "Выберите язык",
        topicTitle: "По какому вопросу вы пишете?",
        smallText: "Выберите тему, откроется WhatsApp",
        buttons: {
          arrest: "Арест",
          accountArrest: "Арест счета",
          autocredit: "Автокредит",
          schedule: "График",
          fiveYearSchedule: "График на 5 лет",
          bankruptcy: "Банкротство",
          courtBankruptcy: "Судебное банкротство"
        },
        messages: {
          arrest: "Здравствуйте, пишу по поводу арестов",
          accountArrest: "Здравствуйте, пишу по поводу ареста счета",
          autocredit: "Здравствуйте, пишу по поводу автокредита",
          schedule: "Здравствуйте, пишу по поводу графика",
          fiveYearSchedule: "Здравствуйте, пишу по поводу графика на 5 лет",
          bankruptcy: "Здравствуйте, пишу по поводу банкротства",
          courtBankruptcy: "Здравствуйте, пишу по поводу судебного банкротства"
        }
      }
    };

    function setLanguage(lang) {
      currentLanguage = lang;
      const selected = data[lang];

      document.getElementById("subtitle").textContent = selected.subtitle;
      document.getElementById("topicTitle").textContent = selected.topicTitle;
      document.getElementById("smallText").textContent = selected.smallText;

      document.getElementById("btnArrest").textContent = selected.buttons.arrest;
      document.getElementById("btnAccountArrest").textContent = selected.buttons.accountArrest;
      document.getElementById("btnAutocredit").textContent = selected.buttons.autocredit;
      document.getElementById("btnSchedule").textContent = selected.buttons.schedule;
      document.getElementById("btnFiveYearSchedule").textContent = selected.buttons.fiveYearSchedule;
      document.getElementById("btnBankruptcy").textContent = selected.buttons.bankruptcy;
      document.getElementById("btnCourtBankruptcy").textContent = selected.buttons.courtBankruptcy;

      document.getElementById("kzBtn").classList.remove("active");
      document.getElementById("ruBtn").classList.remove("active");

      if (lang === "kz") {
        document.getElementById("kzBtn").classList.add("active");
      } else {
        document.getElementById("ruBtn").classList.add("active");
      }
    }

    function openWhatsApp(topic) {
      const message = data[currentLanguage].messages[topic];
      const encodedMessage = encodeURIComponent(message);
      window.location.href = https://wa.me/${phone}?text=${encodedMessage};
    }

    setLanguage("kz");
  </script>
</body>
</html>
